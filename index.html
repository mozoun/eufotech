  <style>
    :root {
      --gold: #D4AF37;
      --gold-bright: #F3D778;
      --bg: #0A0A0A;
      --ink: #E7E5DF;
      --muted: #8C8A84;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Sora', system-ui, -apple-system, Segoe UI, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    :focus-visible {
      outline: 2px solid var(--gold-bright);
      outline-offset: 4px;
      border-radius: 999px;
    }

    /* base background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 44%, #161616 0%, #0A0A0A 70%);
    }

    /* ---------- orbital floating panels (COSMOS-style, on-brand) ---------- */
    .orbit {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      transform-origin: 50% 50%;
      animation: orbit-spin 150s linear infinite;
      -webkit-mask: radial-gradient(circle at 50% 50%, transparent 19%, #000 34%, #000 68%, transparent 90%);
      mask: radial-gradient(circle at 50% 50%, transparent 19%, #000 34%, #000 68%, transparent 90%);
    }

    @keyframes orbit-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .card {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 11px;
      border: 1px solid rgba(212, 175, 55, 0.12);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(212, 175, 55, 0.05) 42%, rgba(0, 0, 0, 0.22));
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.55);
      will-change: transform;
    }

    /* soft vignette so center text stays crisp and edges deepen */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 44%, rgba(212, 175, 55, 0.06), transparent 40%),
        radial-gradient(ellipse at 50% 46%, transparent 46%, rgba(10, 10, 10, 0.66) 100%);
    }

    /* ---------- center ---------- */
    main {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .eufo-logo {
      position: relative;
      width: clamp(210px, 40vmin, 360px);
      height: clamp(210px, 40vmin, 360px);
    }

    .eufo-logo>canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .eufo-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 62%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7%;
      pointer-events: none;
    }

    canvas.eufo-wave {
      width: 48%;
      aspect-ratio: 16/10;
      height: auto;
    }

    .eufo-word {
      width: 100%;
      height: auto;
    }

    .tag {
      margin-top: 18px;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      font-size: clamp(0.74rem, 2.1vw, 0.98rem);
      color: var(--gold-bright);
    }

    .tag span {
      color: var(--gold);
      margin: 0 0.55em;
    }

    .mail {
      margin-top: 34px;
      display: inline-block;
      font-weight: 500;
      font-size: clamp(0.84rem, 2vw, 0.96rem);
      letter-spacing: 0.02em;
      color: var(--gold-bright);
      border: 1px solid rgba(212, 175, 55, 0.35);
      padding: 12px 26px;
      border-radius: 999px;
      background: rgba(10, 10, 10, 0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .mail:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      color: #1b1402;
      border-color: transparent;
      box-shadow: 0 12px 34px rgba(212, 175, 55, 0.3);
    }

    footer {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 22px 24px;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    footer a:hover {
      color: var(--gold-bright);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .reveal {
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }

    .d1 {
      animation-delay: 0.15s;
    }

    .d2 {
      animation-delay: 0.3s;
    }

    @media (prefers-reduced-motion: reduce) {

      .reveal {
        animation: none;
        opacity: 1;
      }

      .orbit {
        animation: none;
      }
    }
  </style>
</head>

  <script>
    (function () {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { /* fewer, static */ }
      const orbit = document.getElementById('orbit');
      if (!orbit) return;
      const N = 15;
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.30;
        const R = 31 + Math.random() * 25;              // distance from center, vmin
        const x = Math.cos(a) * R, y = Math.sin(a) * R;
        const w = 66 + Math.random() * 90;              // px
        const h = w * (0.6 + Math.random() * 0.34);
        const rot = (Math.random() - 0.5) * 38;
        const depth = (R - 31) / 25;                    // 0 inner .. 1 outer
        const c = document.createElement('div');
        c.className = 'card';
        c.style.width = w.toFixed(0) + 'px';
        c.style.height = h.toFixed(0) + 'px';
        c.style.transform =
          'translate(calc(-50% + ' + x.toFixed(2) + 'vmin), calc(-50% + ' + y.toFixed(2) + 'vmin)) rotate(' + rot.toFixed(1) + 'deg)';
        c.style.filter = 'blur(' + (0.6 + depth * 2.4).toFixed(2) + 'px)';
        c.style.opacity = (0.5 - depth * 0.26).toFixed(2);
        orbit.appendChild(c);
      }
    })();

        particles = [];
        const COUNT = 800;
        for (let i = 0; i < COUNT; i++) {
          const band = Math.pow(Math.random(), 0.5);
          const radius = R * (0.72 + band * 0.26);
          const core = R * 0.85;
          const spread = Math.abs(radius - core) / (R * 0.15);
          if (Math.random() < spread * 0.55) { i--; continue; }
          particles.push({
            angle: Math.random() * Math.PI * 2,
            radius: radius,
            size: 0.6 + Math.random() * 2.4,
            color: GOLDS[(Math.random() * GOLDS.length) | 0],
            baseAlpha: 0.35 + Math.random() * 0.65,
            twinkleSpeed: 0.5 + Math.random() * 2.2,
            twinklePhase: Math.random() * Math.PI * 2,
            speed: (0.05 + Math.random() * 0.10) * (radius < core ? 1.25 : 1)
          });
        }
      }

      /* ---------------- waving halftone emblem ---------------- */
      const wCan = document.getElementById('eufoWave');
      const wCtx = wCan.getContext('2d');
      let WW = 0, WH = 0, goldGrad = null;

      const COLS = 16, ROWS = 6;

      function resizeWave() {
        const rect = wCan.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        WW = rect.width; WH = rect.height;
        wCan.width = WW * dpr; wCan.height = WH * dpr;
        wCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        goldGrad = wCtx.createLinearGradient(0, 0, WW, WH);
        goldGrad.addColorStop(0, '#B8902C');
        goldGrad.addColorStop(0.4, '#F3D778');
        goldGrad.addColorStop(0.7, '#D4AF37');
        goldGrad.addColorStop(1, '#8A6A1F');
      }

      function drawWave(t) {
        wCtx.clearRect(0, 0, WW, WH);
        wCtx.fillStyle = goldGrad;

        const phase = reduceMotion ? 0 : t * 2.6;     /* wave speed */
        const dx = WW / (COLS + 1);
        const dy = (WH * 0.52) / (ROWS - 1);
        const topY = WH * 0.22;
        const amp = WH * 0.10;                        /* wave height */
        const k = 0.75;                               /* wave length */

        for (let c = 0; c < COLS; c++) {
          const wavePos = c * k - phase;
          const lift = Math.sin(wavePos) * amp;       /* vertical wave */
          /* light: dots get bigger on the crest of the wave, like the original flag shading */
          const light = 0.62 + 0.38 * Math.sin(wavePos + 1.1);
          /* perspective: slightly smaller at far left edge */
          const edge = 0.75 + 0.25 * Math.sin((c / (COLS - 1)) * Math.PI);

          for (let r = 0; r < ROWS; r++) {
            const rowScale = 1 - r * 0.085;           /* lower rows slightly smaller */
            const x = dx * (c + 1);
            const y = topY + r * dy + lift * (1 - r * 0.06);
            const ry = dx * 0.46 * light * edge * rowScale;  /* vertical ellipse */
            const rx = ry * 0.62;
            if (ry < 0.4) continue;
            wCtx.beginPath();
            wCtx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
            wCtx.fill();
          }
        }
      }

      /* ---------------- main loop ---------------- */
      let last = performance.now();
      function frame(now) {
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        const t = now / 1000;

        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          if (!reduceMotion) p.angle += p.speed * dt;
          const tw = reduceMotion ? 1 : (0.6 + 0.4 * Math.sin(t * p.twinkleSpeed + p.twinklePhase));
          const x = CX + Math.cos(p.angle) * p.radius;
          const y = CY + Math.sin(p.angle) * p.radius;
          ctx.globalAlpha = p.baseAlpha * tw;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(x, y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        drawWave(t);
        requestAnimationFrame(frame);
      }

      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(frame);
    })();
  </script>

</body>

</html>
